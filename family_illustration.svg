<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350" role="img" aria-label="Illustration of Layla, Tamar, and Eden">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF7F9" />
      <stop offset="100%" stop-color="#E8F4F8" />
    </linearGradient>
    
    <!-- Hair Gradients -->
    <linearGradient id="hairBrown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6F4E37" />
      <stop offset="100%" stop-color="#4A3325" />
    </linearGradient>
    <linearGradient id="hairBlond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE68A" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    
    <!-- Glasses Frame Gradients -->
    <linearGradient id="glassesPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8A5C2" />
      <stop offset="100%" stop-color="#D6437A" />
    </linearGradient>
    <linearGradient id="glassesTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8DD1E0" />
      <stop offset="100%" stop-color="#005460" />
    </linearGradient>

    <!-- Clip Paths for Hair -->
    <clipPath id="edenFaceClip">
      <circle cx="160" cy="140" r="45" />
    </clipPath>
    <clipPath id="tamarFaceClip">
      <circle cx="340" cy="140" r="45" />
    </clipPath>
    <clipPath id="laylaFaceClip">
      <circle cx="250" cy="205" r="40" />
    </clipPath>
  </defs>

  <!-- Container Box with Soft Rounding & Border -->
  <rect x="5" y="5" width="490" height="340" rx="16" fill="url(#bgGrad)" stroke="#bfc8cb" stroke-width="1.5" />
  
  <!-- Technical Nodes Grid (Minimalist Backdrop Pattern) -->
  <g opacity="0.15">
    <line x1="80" y1="80" x2="160" y2="140" stroke="#005460" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="420" y1="80" x2="340" y2="140" stroke="#005460" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="160" y1="140" x2="250" y2="205" stroke="#005460" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="340" y1="140" x2="250" y2="205" stroke="#005460" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="250" y1="205" x2="250" y2="300" stroke="#005460" stroke-width="1" stroke-dasharray="4 4" />
    
    <circle cx="80" cy="80" r="5" fill="#226d7a" />
    <circle cx="420" cy="80" r="5" fill="#226d7a" />
    <circle cx="250" cy="300" r="5" fill="#226d7a" />
  </g>

  <!-- ==================== EDEN (Left) ==================== -->
  <g id="eden">
    <!-- Shoulder-Length Hair (Back layer) -->
    <path d="M 115 140 C 115 80, 205 80, 205 140 L 205 210 L 115 210 Z" fill="url(#hairBrown)" />
    
    <!-- Neck -->
    <rect x="150" y="175" width="20" height="30" fill="#E8C3A7" rx="5" />
    
    <!-- Face -->
    <circle cx="160" cy="140" r="45" fill="#FCE3D1" />
    
    <!-- Shoulder-length Hair front/side bangs -->
    <path d="M 115 140 C 115 90, 205 90, 205 140 C 205 110, 185 105, 175 115 C 165 105, 130 110, 115 140 Z" fill="url(#hairBrown)" />
    
    <!-- Eyes (Brown) -->
    <circle cx="145" cy="138" r="4" fill="#4A3325" />
    <circle cx="175" cy="138" r="4" fill="#4A3325" />
    
    <!-- Cheeks (Blush) -->
    <circle cx="138" cy="146" r="6" fill="#F8A5C2" opacity="0.4" />
    <circle cx="182" cy="146" r="6" fill="#F8A5C2" opacity="0.4" />
    
    <!-- Smile -->
    <path d="M 152 154 Q 160 162, 168 154" fill="none" stroke="#4A3325" stroke-width="2" stroke-linecap="round" />
    
    <!-- Clothes -->
    <path d="M 115 215 C 115 190, 205 190, 205 215 L 215 260 L 105 260 Z" fill="#226D7A" />
  </g>

  <!-- ==================== TAMAR (Right) ==================== -->
  <g id="tamar">
    <!-- Hair (Back layer) -->
    <path d="M 295 140 C 295 80, 385 80, 385 140 L 385 200 L 295 200 Z" fill="url(#hairBrown)" />
    
    <!-- Neck -->
    <rect x="330" y="175" width="20" height="30" fill="#E8C3A7" rx="5" />
    
    <!-- Face -->
    <circle cx="340" cy="140" r="45" fill="#FBE0CC" />
    
    <!-- Short/styled Hair front bangs -->
    <path d="M 295 130 C 295 90, 385 90, 385 130 C 385 110, 360 98, 340 105 C 320 98, 295 110, 295 130 Z" fill="url(#hairBrown)" />
    
    <!-- Eyes (Brown) -->
    <circle cx="325" cy="138" r="4" fill="#4A3325" />
    <circle cx="355" cy="138" r="4" fill="#4A3325" />
    
    <!-- Cheeks (Blush) -->
    <circle cx="318" cy="146" r="6" fill="#F8A5C2" opacity="0.4" />
    <circle cx="362" cy="146" r="6" fill="#F8A5C2" opacity="0.4" />
    
    <!-- Smile -->
    <path d="M 332 154 Q 340 162, 348 154" fill="none" stroke="#4A3325" stroke-width="2" stroke-linecap="round" />
    
    <!-- Glasses (Teal/Dark) -->
    <g fill="none" stroke="url(#glassesTeal)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="325" cy="138" r="11" />
      <circle cx="355" cy="138" r="11" />
      <path d="M 336 138 L 344 138" />
      <path d="M 314 138 L 305 134" />
      <path d="M 366 138 L 375 134" />
    </g>
    
    <!-- Clothes -->
    <path d="M 295 215 C 295 190, 385 190, 385 215 L 395 260 L 285 260 Z" fill="#8A486F" />
  </g>

  <!-- ==================== LAYLA (LULI - Center Front) ==================== -->
  <g id="layla">
    <!-- Blond Hair (Back layer) -->
    <path d="M 210 205 C 210 150, 290 150, 290 205 L 290 250 L 210 250 Z" fill="url(#hairBlond)" />
    
    <!-- Neck -->
    <rect x="242" y="235" width="16" height="25" fill="#EFCBB0" rx="4" />
    
    <!-- Face (Chubby) -->
    <!-- We use an overlapping path or ellipse for chubby cheeks -->
    <path d="M 210 205 C 210 170, 290 170, 290 205 C 290 238, 275 250, 250 250 C 225 250, 210 238, 210 205 Z" fill="#FFEFE2" />
    
    <!-- Hair Bangs (Blond) -->
    <path d="M 210 190 C 210 165, 290 165, 290 190 C 290 178, 272 173, 250 180 C 228 173, 210 178, 210 190 Z" fill="url(#hairBlond)" />
    
    <!-- Eyes behind glasses (Happy Arcs) -->
    <path d="M 231 205 Q 235 201, 239 205" fill="none" stroke="#4A3325" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 261 205 Q 265 201, 269 205" fill="none" stroke="#4A3325" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Chubby Cheeks (Blush) -->
    <circle cx="224" cy="216" r="9" fill="#F8A5C2" opacity="0.6" />
    <circle cx="276" cy="216" r="9" fill="#F8A5C2" opacity="0.6" />
    
    <!-- Cute open smile (childlike) -->
    <path d="M 242 220 C 242 220, 250 228, 258 220" fill="none" stroke="#4A3325" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Pink Glasses -->
    <g fill="none" stroke="url(#glassesPink)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="235" cy="206" r="12" />
      <circle cx="265" cy="206" r="12" />
      <path d="M 247 206 L 253 206" />
      <path d="M 223 206 L 216 202" />
      <path d="M 277 206 L 284 202" />
    </g>
    
    <!-- Clothes (Teal with Pink Accents) -->
    <path d="M 205 250 C 205 230, 295 230, 295 250 L 310 320 L 190 320 Z" fill="#226D7A" />
    <!-- Pink Collar -->
    <path d="M 235 250 C 235 258, 265 258, 265 250" fill="none" stroke="#F9A8D4" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
