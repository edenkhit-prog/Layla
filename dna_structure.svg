<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100" role="img" aria-label="Animated DNA Double Helix Illustration">
  <style>
    .strand-a {
      fill: #226d7a;
      animation: waveA 6s ease-in-out infinite;
    }
    .strand-b {
      fill: #f9a8d4;
      animation: waveB 6s ease-in-out infinite;
    }
    .link-line {
      stroke: #bfc8cb;
      stroke-width: 1.5;
      stroke-linecap: round;
      animation: linkAnim 6s ease-in-out infinite;
    }
    
    @keyframes waveA {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(20px); }
    }
    @keyframes waveB {
      0%, 100% { transform: translateY(20px); }
      50% { transform: translateY(0px); }
    }
    @keyframes linkAnim {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
  </style>

  <!-- Connection Links -->
  <g>
    <!-- We create links between strand elements at regular intervals -->
    <!-- We animate links by coupling their positions with the nodes -->
    <line x1="50" y1="40" x2="50" y2="80" class="link-line" />
    <line x1="120" y1="45" x2="120" y2="75" class="link-line" />
    <line x1="190" y1="55" x2="190" y2="65" class="link-line" />
    <line x1="260" y1="75" x2="260" y2="45" class="link-line" />
    <line x1="330" y1="80" x2="330" y2="40" class="link-line" />
    <line x1="400" y1="75" x2="400" y2="45" class="link-line" />
    <line x1="470" y1="55" x2="470" y2="65" class="link-line" />
    <line x1="540" y1="45" x2="540" y2="75" class="link-line" />
    <line x1="610" y1="40" x2="610" y2="80" class="link-line" />
    <line x1="680" y1="45" x2="680" y2="75" class="link-line" />
    <line x1="750" y1="55" x2="750" y2="65" class="link-line" />
  </g>

  <!-- Strand Nodes A (Teal) -->
  <g>
    <circle cx="50" cy="40" r="8" class="strand-a" style="animation-delay: 0s;" />
    <circle cx="120" cy="45" r="8" class="strand-a" style="animation-delay: -0.6s;" />
    <circle cx="190" cy="55" r="8" class="strand-a" style="animation-delay: -1.2s;" />
    <circle cx="260" cy="65" r="8" class="strand-a" style="animation-delay: -1.8s;" />
    <circle cx="330" cy="80" r="8" class="strand-a" style="animation-delay: -2.4s;" />
    <circle cx="400" cy="75" r="8" class="strand-a" style="animation-delay: -3.0s;" />
    <circle cx="470" cy="65" r="8" class="strand-a" style="animation-delay: -3.6s;" />
    <circle cx="540" cy="55" r="8" class="strand-a" style="animation-delay: -4.2s;" />
    <circle cx="610" cy="40" r="8" class="strand-a" style="animation-delay: -4.8s;" />
    <circle cx="680" cy="45" r="8" class="strand-a" style="animation-delay: -5.4s;" />
    <circle cx="750" cy="55" r="8" class="strand-a" style="animation-delay: -6.0s;" />
  </g>

  <!-- Strand Nodes B (Pink) -->
  <g>
    <circle cx="50" cy="80" r="8" class="strand-b" style="animation-delay: 0s;" />
    <circle cx="120" cy="75" r="8" class="strand-b" style="animation-delay: -0.6s;" />
    <circle cx="190" cy="65" r="8" class="strand-b" style="animation-delay: -1.2s;" />
    <circle cx="260" cy="55" r="8" class="strand-b" style="animation-delay: -1.8s;" />
    <circle cx="330" cy="40" r="8" class="strand-b" style="animation-delay: -2.4s;" />
    <circle cx="400" cy="45" r="8" class="strand-b" style="animation-delay: -3.0s;" />
    <circle cx="470" cy="55" r="8" class="strand-b" style="animation-delay: -3.6s;" />
    <circle cx="540" cy="65" r="8" class="strand-b" style="animation-delay: -4.2s;" />
    <circle cx="610" cy="80" r="8" class="strand-b" style="animation-delay: -4.8s;" />
    <circle cx="680" cy="75" r="8" class="strand-b" style="animation-delay: -5.4s;" />
    <circle cx="750" cy="65" r="8" class="strand-b" style="animation-delay: -6.0s;" />
  </g>
</svg>
